name: Deploy Habits API

on:
  push:
    branches:
      - master
    paths:
      - "server/**"
  workflow_dispatch:

# Garante que apenas um deploy rode por vez
concurrency:
  group: deploy-api
  cancel-in-progress: false  # aguarda o anterior terminar

jobs:
  # Etapa 1: validação
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: server/vendor
          key: composer-${{ hashFiles('server/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --optimize-autoloader --no-interaction --prefer-dist

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Check syntax (lint)
        run: find src -name "*.php" -print0 | xargs -0 php -l

      - name: Check code style
        run: composer cs-check

      - name: Run unit tests
        run: composer test:unit

# Etapa 2: deploy (só roda se validate passar)
  deploy:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Restore Composer cache
        uses: actions/cache@v4
        with:
          path: server/vendor
          key: composer-${{ hashFiles('server/composer.lock') }}

      - name: Install dependencies
        working-directory: server
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@v5.1.0  # versão fixada
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
          SOURCE: "server/"
          TARGET: "/var/www/habits/server/"
          ARGS: "-rlgoDz --delete"
          EXCLUDE: "README.md,.git/,.gitignore,.env.example,.dockerignore,docker-compose.yml,Dockerfile,.docker/,docs/,tools/,logs/,.env,config/keys/,storage/"
          SCRIPT_AFTER: |
            set -e  # falha imediatamente se qualquer comando falhar
            cd /var/www/habits/server
            sudo systemctl reload php8.4-fpm
            echo "Deploy concluído: $(date)"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy falhou! Verifique os logs acima."
          # Aqui você pode adicionar integração com Slack, Discord, e-mail, etc.