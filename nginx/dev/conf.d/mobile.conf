server {
    listen 80;
    server_name mobile.localhost localhost;

    access_log /var/log/nginx/mobile.access.log;
    error_log  /var/log/nginx/mobile.error.log;

    location / {
        proxy_pass http://mobile:8100/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Vite HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Block actual hidden files (e.g. .env, .git) but allow Vite internal paths like /node_modules/.vite/
    location ~ /\.(?!vite|well-known) {
        deny all;
    }
}
