server {
    listen 80;
    server_name api.localhost;

    client_max_body_size 20M;
    root /var/www/html/public;
    index index.php;

    access_log /var/log/nginx/api.access.log;
    error_log  /var/log/nginx/api.error.log;

    include snippets/security-headers-api.conf;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Internal location for X-Accel-Redirect (protected files)
    location /internal_static/ {
        internal;
        alias /var/www/html/storage/;
    }

    # Internal location for X-Accel-Redirect (uploads)
    location /internal_uploads/ {
        internal;
        alias /var/www/html/storage/uploads/;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        include snippets/fastcgi-proxy.conf;
        fastcgi_pass server:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME     $fastcgi_script_name;

        # Headers repeated here intentionally (add_header does not inherit from parent location)
        include snippets/security-headers-api.conf;
    }

    location ~ /\. {
        deny all;
    }
}
