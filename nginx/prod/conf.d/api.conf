# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name habits.davidfreitas.dev.br;

    location /.well-known/acme-challenge/ {
        root /var/www/html/public;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name habits.davidfreitas.dev.br;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    include snippets/ssl.conf;

    client_max_body_size 20M;
    root /var/www/html/public;
    index index.php;

    access_log /var/log/nginx/server.access.log;
    error_log  /var/log/nginx/server.error.log warn;

    include snippets/security-headers-api.conf;

    gzip on;
    gzip_types application/json application/javascript text/plain text/css;
    gzip_min_length 1024;

    limit_req zone=api burst=60 nodelay;

    location ~* \.(env|log|sql|yaml|yml)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        include snippets/fastcgi-proxy.conf;
        fastcgi_pass server:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME     $fastcgi_script_name;

        # Headers repeated here intentionally (add_header does not inherit from parent location)
        include snippets/security-headers-api.conf;
    }

    location /protected_files/ {
        internal;
        alias /var/www/html/storage/;
        expires off;
        add_header Cache-Control        "private, no-cache, no-store";
        add_header X-Content-Type-Options "nosniff"                   always;
        add_header X-Frame-Options       "DENY"                       always;
    }

    location /protected_uploads/ {
        internal;
        alias /var/www/html/storage/uploads/;
        expires off;
        add_header Cache-Control        "private, no-cache, no-store";
        add_header X-Content-Type-Options "nosniff"                   always;
        add_header X-Frame-Options       "DENY"                       always;
    }

    location ~ /\. {
        deny all;
    }
}
