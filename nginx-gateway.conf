# Mobile App (mobile.localhost e localhost)
server {
    listen 80;
    server_name mobile.localhost localhost;

    location / {
        proxy_pass http://mobile:8100/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Suporte para WebSocket do Vite (HMR)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    access_log /var/log/nginx/app_access.log;
    error_log /var/log/nginx/app_error.log;
}

# API (api.localhost)
server {
    listen 80;
    server_name api.localhost;

    root /var/www/html/api/public;
    index index.php;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Internal locations for X-Accel-Redirect (Images)
    location /internal_static/ {
        internal;
        alias /var/www/html/api/storage/;
    }

    location /internal_uploads/ {
        internal;
        alias /var/www/html/api/storage/uploads/;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_index index.php;
        fastcgi_pass api:9000;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
    }

    access_log /var/log/nginx/api_access.log;
    error_log /var/log/nginx/api_error.log;
}
